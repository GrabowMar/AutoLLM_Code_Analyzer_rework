volumes:
  backend_local_postgres_data: {}
  backend_local_postgres_data_backups: {}
  backend_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: backend_local_django
    depends_on:
      - postgres
      - redis
      - mailpit
    # Lets the app reverse-proxy (APPS_PROXY_PATH) reach a sample app's published
    # host port at host.docker.internal:<app_port>.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /app/.venv
      - .:/app:z
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '8001:8000'
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: backend_production_postgres
    volumes:
      - backend_local_postgres_data:/var/lib/postgresql/data
      - backend_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  mailpit:
    image: docker.io/axllent/mailpit:latest
    ports:
      - "8025:8025"

  redis:
    image: docker.io/redis:8.8
    volumes:
      - backend_local_redis_data:/data

  celeryworker:
    <<: *django
    image: backend_local_celeryworker
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: backend_local_celerybeat
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: backend_local_flower
    ports:
      - '5555:5555'
    command: /start-flower

  frontend:
    build:
      context: .
      dockerfile: ./compose/local/frontend/Dockerfile
    image: backend_local_frontend
    restart: unless-stopped
    depends_on:
      - django
    volumes:
      - ./frontend:/app/frontend:z
      - /app/frontend/node_modules
    environment:
      - API_TARGET=http://django:8000
      - ORIGIN=${FRONTEND_ORIGIN:-http://localhost:8000}
      - PORT=8080
      - HOST=0.0.0.0
      - NODE_ENV=development
    ports:
      - '8000:8080'
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "8080"]
