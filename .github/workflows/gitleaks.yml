name: Gitleaks

on:
  workflow_dispatch:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
