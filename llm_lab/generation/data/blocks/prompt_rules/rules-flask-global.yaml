slug: rules-flask-global
version: 1
block_type: prompt_rules
name: Flask global rules
description: Runtime and ORM constraints shared across Flask stacks
content: |
  ## Runtime rules
  - SQLite URI: use `sqlite:////app/data/app.db` (absolute path under /app/data)
  - Listen on `PORT` env defaulting to **8000**
  - Wrap `db.create_all()` and seed logic inside `with app.app_context():` under `if __name__ == '__main__':`
  - Forbidden: `@app.before_first_request`, `Model.query.get(id)` (use `db.session.get()`)
