volumes:
  production_postgres_data: {}
  production_postgres_data_backups: {}
  production_traefik: {}
  production_traefik_dynamic: {}
  production_django_media: {}
  production_redis_data: {}

networks:
  # Shared network between Traefik and generated sample-app containers.
  # Traefik reaches containers here by name; containers do NOT bind host ports.
  llm_apps:
    name: llm_apps
    driver: bridge

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    image: backend_production_django
    volumes:
      - production_django_media:/app/backend/media
      - production_traefik_dynamic:/traefik-dynamic
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    environment:
      - TRAEFIK_DYNAMIC_DIR=/traefik-dynamic
      - DOCKER_APPS_NETWORK=llm_apps
    networks:
      - default
      - llm_apps
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: backend_production_postgres
    volumes:
      - production_postgres_data:/var/lib/postgresql/data
      - production_postgres_data_backups:/backups
    env_file:
      - ./.envs/.production/.postgres

  traefik:
    build:
      context: .
      dockerfile: ./compose/production/traefik/Dockerfile
    image: backend_production_traefik
    depends_on:
      - django
    env_file:
      # .django provides DJANGO_DOMAIN, APPS_DOMAIN, LETSENCRYPT_EMAIL.
      - ./.envs/.production/.django
      # .traefik provides the DNS-01 provider + credentials used to issue the
      # wildcard *.APPS_DOMAIN cert (e.g. TRAEFIK_DNS_PROVIDER, CF_DNS_API_TOKEN).
      - ./.envs/.production/.traefik
    volumes:
      - production_traefik:/etc/traefik/acme
      - production_traefik_dynamic:/etc/traefik/dynamic
    networks:
      - default
      - llm_apps
    ports:
      - '0.0.0.0:80:80'
      - '0.0.0.0:443:443'
      - '0.0.0.0:5555:5555'

  redis:
    image: docker.io/redis:7.2

    volumes:
      - production_redis_data:/data

  celeryworker:
    <<: *django
    image: backend_production_celeryworker
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: backend_production_celerybeat
    command: /start-celerybeat

  flower:
    <<: *django
    image: backend_production_flower
    command: /start-flower

  nginx:
    build:
      context: .
      dockerfile: ./compose/production/nginx/Dockerfile
    image: backend_production_nginx
    depends_on:
      - django
    volumes:
      - production_django_media:/usr/share/nginx/media:ro

  frontend:
    build:
      context: .
      dockerfile: ./compose/production/frontend/Dockerfile
    image: backend_production_frontend
    depends_on:
      - django
    env_file:
      - ./.envs/.production/.frontend
