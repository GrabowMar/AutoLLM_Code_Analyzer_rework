bundle_schema_version: 1
default_bundle_slug: system-scaffolding-standard

default_block_refs:
  - type: prompt_stage
    slug: base-backend-system
    version: 1
  - type: prompt_stage
    slug: base-backend-user
    version: 1
  - type: prompt_stage
    slug: base-frontend-system
    version: 1
  - type: prompt_stage
    slug: base-frontend-user
    version: 1
  - type: prompt_tone
    slug: tone-standard
    version: 1
  - type: prompt_rules
    slug: rules-flask-global
    version: 1

bundles:
  - slug: system-scaffolding-standard
    name: Standard scaffolding (v2 prompts)
    description: Default research bundle — v2 stage prompts, standard tone, Flask rules
    scaffolding_slug: flask-react
    is_default: true
    block_refs:
      - type: prompt_stage
        slug: base-backend-system
        version: 1
      - type: prompt_stage
        slug: base-backend-user
        version: 1
      - type: prompt_stage
        slug: base-frontend-system
        version: 1
      - type: prompt_stage
        slug: base-frontend-user
        version: 1
      - type: prompt_tone
        slug: tone-standard
        version: 1
      - type: prompt_rules
        slug: rules-flask-global
        version: 1

  # app-content-recipe-list is NOT defined here: it's a per-app override of
  # system-scaffolding-standard, owned by
  # requirements/manifests/content_recipe_list.yaml. Defining it in both
  # places let them drift and made seeding non-idempotent (each seed pass
  # picked up whichever definition ran last).

  - slug: system-fastapi-vue-standard
    name: FastAPI + Vue standard
    description: FastAPI backend prompts paired with Vue frontend prompts and shared FastAPI rules
    scaffolding_slug: fastapi-vue
    is_default: true
    block_refs:
      - type: prompt_stage
        slug: fastapi-backend-system
        version: 1
      - type: prompt_stage
        slug: fastapi-backend-user
        version: 1
      - type: prompt_stage
        slug: vue-frontend-system
        version: 1
      - type: prompt_stage
        slug: vue-frontend-user
        version: 1
      - type: prompt_tone
        slug: tone-standard
        version: 1
      - type: prompt_rules
        slug: rules-fastapi-global
        version: 1

  - slug: system-fastapi-react-standard
    name: FastAPI + React standard
    description: FastAPI backend prompts paired with the default React frontend prompts
    scaffolding_slug: fastapi-react
    is_default: true
    block_refs:
      - type: prompt_stage
        slug: fastapi-backend-system
        version: 1
      - type: prompt_stage
        slug: fastapi-backend-user
        version: 1
      - type: prompt_stage
        slug: base-frontend-system
        version: 1
      - type: prompt_stage
        slug: base-frontend-user
        version: 1
      - type: prompt_tone
        slug: tone-standard
        version: 1
      - type: prompt_rules
        slug: rules-fastapi-global
        version: 1
