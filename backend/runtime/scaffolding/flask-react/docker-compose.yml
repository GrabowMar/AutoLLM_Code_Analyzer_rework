# For manual development use — not used by the runtime system
services:
  app:
    build: .
    container_name: ${PROJECT_NAME:-myapp}
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - FLASK_ENV=production
      - PORT=8000
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  app-data:
    driver: local
