slug: mypy
name: Mypy
description: >-
  Optional static type checker for Python. Catches type errors, missing
  attributes, and incompatible signatures before runtime.
category: lint
kind: container
target_language: python
icon: check-check
version: "1"
docs_url: https://mypy.readthedocs.io/
install_cmd: "pip install --user mypy"
verify_cmd: "mypy --version"
run_cmd: "mypy {target} --no-error-summary --no-color-output --show-error-codes --ignore-missing-imports --no-pretty"
parser_key: mypy
run_timeout: 180
install_timeout: 300
display_order: 50
config_schema: []
default_config: {}
sample_code: |
  def greet(name: str) -> str:
      return "hi " + name


  greet(123)
