slug: detect-secrets
name: detect-secrets
description: >-
  Secret scanner from Yelp. Uses keyword heuristics, entropy analysis and
  provider-specific detectors to find hardcoded credentials in source code.
category: secrets
kind: container
target_language: any
icon: key
version: "1.5"
docs_url: https://github.com/Yelp/detect-secrets
install_cmd: "pip install --user 'detect-secrets==1.5.*'"
verify_cmd: "detect-secrets --version"
# --all-files is required because {target} is not a git repository, and the
# scan must run from inside the target dir: absolute paths are silently
# ignored by detect-secrets' path filtering.
run_cmd: "cd {target} && detect-secrets scan --all-files ."
parser_key: detect_secrets
run_timeout: 120
install_timeout: 180
display_order: 70
config_schema: []
default_config: {}
sample_code: |
  AWS_ACCESS_KEY_ID = "AKIAIOSFODNN7EXAMPLE"
  AWS_SECRET_ACCESS_KEY = "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
