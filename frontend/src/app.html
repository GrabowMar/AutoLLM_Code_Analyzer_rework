<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600;700&display=swap"
          rel="stylesheet" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      // Prevent app.html recovery scripts from tearing down a working SSR shell.
      // (Do not tie this to CSRF/session — those can take longer than a few seconds.)
      window.__sveltekit_hydrated = true;

      window.__hardReload = function() {
        var done = function() {
          var url = new URL(window.location.href);
          url.searchParams.delete('_r');
          url.searchParams.set('_cb', Date.now().toString(36));
          window.location.replace(url.toString());
        };
        try {
          var tasks = [];
          if (window.caches && caches.keys) {
            tasks.push(caches.keys().then(function(keys) {
              return Promise.all(keys.map(function(k) {
                return caches.delete(k);
              }));
            }));
          }
          if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
            tasks.push(navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) {
                return r.unregister();
              }));
            }));
          }
          if (tasks.length) {
            Promise.all(tasks).then(done, done);
            setTimeout(done, 1500);
          } else {
            done();
          }
        } catch (e) {
          done();
        }
      };

      // Manual recovery only (e.g. from a future in-app banner). Never auto-replace the DOM.
      window.__showFallback = function() {
        document.body.innerHTML =
          '<div style="display:flex;min-height:100vh;align-items:center;justify-content:center;background:#0f172a;color:#e2e8f0">' +
          '<div style="display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;padding:24px;font-family:system-ui,sans-serif">' +
          '<p style="color:#94a3b8;font-size:15px">The application failed to load.<br />Try a hard refresh (Ctrl+Shift+R) after a dev server restart.</p>' +
          '<button onclick="window.__hardReload()" style="padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500">Reload Page</button>' +
          '<a href="/auth/login" style="color:#60a5fa;font-size:13px;text-decoration:underline">Go to login page</a>' +
          '</div></div>';
      };

      if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) {
            r.unregister();
          });
        }).catch(function() {});
      }

      // Stale chunk after Vite restart: reload once per tab session, never destroy the page.
      window.addEventListener('unhandledrejection', function(e) {
        var msg = (e.reason && (e.reason.message || String(e.reason))) || '';
        if (!/Failed to fetch dynamically imported module|Importing a module script failed|ChunkLoadError/i.test(msg)) {
          return;
        }
        e.preventDefault();
        console.warn('[llm-lab] Chunk load failed:', e.reason);
        try {
          if (!sessionStorage.getItem('llm_lab_chunk_reload')) {
            sessionStorage.setItem('llm_lab_chunk_reload', '1');
            window.__hardReload();
          }
        } catch (_) {
          window.__hardReload();
        }
      });

      // Drop legacy recovery query params from older app.html versions.
      try {
        var u = new URL(window.location.href);
        if (u.searchParams.has('_r') || u.searchParams.has('_cb')) {
          u.searchParams.delete('_r');
          u.searchParams.delete('_cb');
          window.history.replaceState(window.history.state, '', u.toString());
        }
        sessionStorage.removeItem('llm_lab_chunk_reload');
      } catch (_) {}
    </script>
  </body>
</html>
